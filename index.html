<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>KOSI RIDE</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<body>

<header class="hero">

<nav class="navbar">

<div class="logo">🚖 KOSI RIDE</div>

<div class="menu">
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#booking">Book Ride</a>

</div>

</nav>

<div class="hero-content"> 

<h1>Book Your Ride in Seconds</h1>

<p>
Fast • Safe • Affordable Taxi Service
in Saharsa & Nearby Areas
</p>

<div class="booking-box">

type="text"

type="text"
placeholder="📍 Destination">

<input
type="number"
placeholder="Approx Distance (KM)">

<button onclick="estimateFare()">

</button>

<a href="tel:1111111111">

📞 Call Now
</button>

</button>
</a>

</header>

<section id="services">

<h2>Our Services</h2>

<div class="cards">

<div class="card">
🚕
<h3>Local Ride</h3>
<p>Affordable city rides.</p>
</div>

<div class="card">
✈️
<h3>Airport Pickup</h3>
<p>24×7 Airport Taxi.</p>
</div>

<div class="card">
🏙️

<p>Anywhere in Bihar.</p>
</div>

</div>
